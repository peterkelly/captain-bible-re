name: Publish documentation

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - ".github/workflows/publish-docs.yml"
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install mdBook
        env:
          MDBOOK_URL: >-
            https://github.com/rust-lang/mdBook/releases/download/v0.5.3/mdbook-v0.5.3-x86_64-unknown-linux-gnu.tar.gz
          MDBOOK_SHA256: e2fd508a4fac06cbaa9f88b97d27bdc3b55a08946304ca845879fe26a3699e11
        run: |
          archive="${RUNNER_TEMP}/mdbook.tar.gz"
          curl --fail --location --silent --show-error \
            --output "${archive}" "${MDBOOK_URL}"
          printf '%s  %s\n' "${MDBOOK_SHA256}" "${archive}" \
            | sha256sum --check
          tar --extract --gzip --file "${archive}" \
            --directory "${RUNNER_TEMP}"
          echo "${RUNNER_TEMP}" >> "${GITHUB_PATH}"

      - name: Build documentation
        run: |
          mdbook --version
          mdbook build docs
          test -f docs/book/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/book

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
